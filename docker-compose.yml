services:
  postgres:
    image: postgres:16-alpine
    container_name: tessa-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tessa_local
      POSTGRES_USER: tessa
      POSTGRES_PASSWORD: tessa
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tessa -d tessa_local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
